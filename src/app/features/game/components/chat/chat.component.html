<div class="chat" [class.history-open]="historyOpen()">
  <div class="messages" #msgList>
    @for (msg of messages(); track msg.id) {
      <div class="message" [class.mine]="msg.userId === myUserId()">
        @if (msg.rank >= 1) {
          <img src="assets/images/modo.png" [alt]="msg.rank >= 2 ? 'Admin' : 'Modo'" class="chat-badge" />
        }
        <strong>{{ msg.username }}:</strong> {{ msg.text }}
      </div>
    } @empty {
      <div class="message empty">Aucun message. Soyez le premier à parler&nbsp;!</div>
    }
  </div>
  <div class="new-message">
    <div class="bar">
      <div class="open_close" (click)="toggleHistory()" [title]="historyOpen() ? 'Fermer le chat' : 'Ouvrir le chat'">{{ historyOpen() ? '-' : '+' }}</div>
      <input
        type="text"
        class="chat-input"
        [(ngModel)]="text"
        (keyup.enter)="send()"
        placeholder="Écrire un message..."
        aria-label="Écrire un message"
        autocomplete="off" />
      <div class="enter" (click)="send()" role="button" tabindex="0" (keyup.enter)="send()">⏎</div>
    </div>
  </div>
</div>
