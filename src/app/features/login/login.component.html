<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Toon Live</mat-card-title>
      <mat-card-subtitle>Entrez votre pseudo pour rejoindre</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Pseudo</mat-label>
        <input matInput [(ngModel)]="username" (keyup.enter)="submit()"
               placeholder="Ex: Toon92" autocomplete="off" />
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-flat-button color="primary" [disabled]="loading || !username.trim()" (click)="submit()">
        {{ loading ? 'Connexion…' : 'Entrer' }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
